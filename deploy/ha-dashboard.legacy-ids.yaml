# Home Assistant dashboard — LEGACY entity-id variant.
#
# Use this only on an HA instance whose MQTT entities were created *before* the
# `object_id: solar_*` discovery field was added (commit 44524c1). On those instances HA
# kept the auto-derived ids `sensor.smart_home_curtailment_*` and ignores `object_id` on
# every later republish (object_id only sets the entity_id at first creation).
#
# A FRESH HA install creates `sensor.solar_*` correctly -> use `ha-dashboard.yaml` instead.
# To migrate an existing box to the clean names, rename the entities in the HA UI
# (Settings -> Devices & Services -> MQTT device -> each entity -> Entity ID), then switch
# back to `ha-dashboard.yaml`.

title: Solar
views:
  - title: Overview
    cards:
      # Gate curtailment writes from HA. OFF (default) = monitoring only, inverter at full
      # power; ON = execute the planned derating. State persists across restarts.
      - type: tile
        entity: switch.smart_home_curtailment_curtailment_control
        name: Curtailment control
        icon: mdi:transmission-tower-export

      - type: glance
        title: Now
        entities:
          - entity: sensor.smart_home_curtailment_curtailment_action
            name: Action
          - entity: sensor.smart_home_curtailment_day_ahead_price
            name: Price
          - entity: sensor.smart_home_curtailment_active_power_derating
            name: Derating
          - entity: sensor.smart_home_curtailment_target_derating
            name: Target
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.smart_home_curtailment_pv_production
            name: PV
            min: 0
            max: 5000
            severity:
              green: 0
              yellow: 4000
              red: 4800
          - type: gauge
            entity: sensor.smart_home_curtailment_grid_net_power
            name: Grid +imp/-exp
            min: -5000
            max: 5000
          - type: gauge
            entity: sensor.smart_home_curtailment_load
            name: Load
            min: 0
            max: 5000
      - type: history-graph
        title: Power (24h)
        hours_to_show: 24
        entities:
          - sensor.smart_home_curtailment_pv_production
          - sensor.smart_home_curtailment_load
          - sensor.smart_home_curtailment_grid_net_power

      # Full day-ahead plan (today + tomorrow once published ~13:00 CET). The price is shown as
      # bars; the *curtailment schedule* is overlaid as translucent full-height bands (orange =
      # ZERO_EXPORT, red = FULL_CURTAIL) on a hidden 0..1 axis, so it stays visible even where
      # the price (and bar) is near zero — which is exactly when curtailment happens.
      # Requires the HACS "apexcharts-card" custom card (or the card JS dropped in www/ and
      # registered as a dashboard resource).
      - type: custom:apexcharts-card
        header:
          show: true
          title: Day-ahead plan (forecast)
        graph_span: 2d
        span:
          start: day
        now:
          show: true
          label: now
        yaxis:
          - id: price
            decimals: 0
            apex_config:
              title:
                text: EUR/MWh
          - id: flag
            show: false
            min: 0
            max: 1
            opposite: true
        series:
          - entity: sensor.smart_home_curtailment_day_ahead_forecast
            name: Price
            type: column
            yaxis_id: price
            color: "#26a69a"
            data_generator: |
              return (entity.attributes.points || []).map(x => [x.t, x.p]);
          - entity: sensor.smart_home_curtailment_day_ahead_forecast
            name: Zero export
            type: area
            yaxis_id: flag
            color: "#ffa726"
            opacity: 0.28
            stroke_width: 0
            curve: stepline
            show:
              legend_value: false
            data_generator: |
              return (entity.attributes.points || [])
                .map(x => [x.t, x.a === 'ZERO_EXPORT' ? 1 : 0]);
          - entity: sensor.smart_home_curtailment_day_ahead_forecast
            name: Full curtail
            type: area
            yaxis_id: flag
            color: "#ef5350"
            opacity: 0.33
            stroke_width: 0
            curve: stepline
            show:
              legend_value: false
            data_generator: |
              return (entity.attributes.points || [])
                .map(x => [x.t, x.a === 'FULL_CURTAIL' ? 1 : 0]);
      - type: entities
        title: Detail
        entities:
          - entity: sensor.smart_home_curtailment_grid_l1
            name: Grid L1
          - entity: sensor.smart_home_curtailment_grid_l2
            name: Grid L2
          - entity: sensor.smart_home_curtailment_grid_l3
            name: Grid L3
          - entity: sensor.smart_home_curtailment_grid_import_total
            name: Grid import total
          - entity: sensor.smart_home_curtailment_grid_export_total
            name: Grid export total
          - entity: sensor.smart_home_curtailment_active_power_derating
            name: Active power derating
          - entity: sensor.smart_home_curtailment_target_derating
            name: Target derating
          - entity: sensor.smart_home_curtailment_day_ahead_price
            name: Day-ahead price
          - entity: sensor.smart_home_curtailment_curtailment_action
            name: Curtailment action
