# Home Assistant + Mosquitto (MQTT) for the smart_home Pi.
#   cd deploy && docker compose up -d
# Both use host networking so the on-host controller and HA share localhost:1883.
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant
    network_mode: host
    restart: unless-stopped
    environment:
      - TZ=Europe/Brussels
    volumes:
      - ./ha-config:/config
    depends_on:
      - mosquitto

volumes:
  mosquitto-data:
