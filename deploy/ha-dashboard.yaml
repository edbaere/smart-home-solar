# Ready-to-paste Home Assistant dashboard for the smart_home entities.
# Entity ids are fixed via MQTT discovery object_id (sensor.solar_*), so this pastes cleanly.
# HA: Settings -> Dashboards -> (open/new) -> Edit (pencil) -> ⋮ -> Raw configuration editor
#     -> replace all with this -> Save.
title: Solar
views:
  - title: Overview
    cards:
      # Gate curtailment writes from HA. OFF (default) = monitoring only, inverter at full
      # power; ON = execute the planned derating. State persists across restarts.
      - type: tile
        entity: switch.solar_curtail_enable
        name: Curtailment control
        icon: mdi:transmission-tower-export

      # Two mutually-exclusive manual modes, each overriding the plan (revert to OFF on restart,
      # apply within ~30 s). "Manual override" writes a fixed derating %. "Injection limit"
      # closed-loops the inverter so grid export holds at the target watts.
      - type: entities
        title: Manual control
        entities:
          - entity: switch.solar_manual_override
            name: Manual override
          - entity: number.solar_manual_derating
            name: Derating %
          - type: divider
          - entity: switch.solar_injection_limit
            name: Injection limit
          - entity: number.solar_injection_target
            name: Injection target (W)

      # Plain-language "what's happening right now". Translates the raw action enum into a
      # sentence (with the *why*), and reframes the derating % as "% of full power" — far more
      # legible than two near-identical derating numbers. Markdown is HA-native (no HACS card).
      - type: markdown
        title: Now
        content: >
          {% set action = states('sensor.solar_action') %}
          {% set derating = states('sensor.solar_derating') | float(0) %}
          {% set target = states('sensor.solar_target_derating') | float(0) %}
          {% set map = {
            'NORMAL':       ['🟢','Exporting surplus','Self-consuming and selling the rest at the feed-in price.'],
            'ZERO_EXPORT':  ['🟠','Holding export at zero','Feed-in price is negative — clipping surplus so nothing is sold.'],
            'FULL_CURTAIL': ['🔴','Inverter off','Consuming costs less than nothing — the grid pays us to stop producing.'],
            'MANUAL':       ['🔧','Manual override','Derating forced by hand, ignoring the plan.'],
            'INJECTION':    ['🎯','Injection limit','Closed-loop holding grid export at the target watts.'] } %}
          {% set m = map.get(action, ['❔', action, '']) %}
          ## {{ m[0] }} {{ m[1] }}
          {{ m[2] }}

          **Inverter output:** {{ (100 - derating) | round(0) }}% of full power{% if (target | round(0)) != (derating | round(0)) %} → ramping to {{ (100 - target) | round(0) }}%{% endif %}

          **Day-ahead price:** {{ states('sensor.solar_belpex') }} EUR/MWh

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.solar_pv_power
            name: PV
            min: 0
            max: 5000
            severity: {green: 0, yellow: 4000, red: 4800}
          - type: gauge
            entity: sensor.solar_grid_power
            name: Grid +imp/-exp
            min: -5000
            max: 5000
          - type: gauge
            entity: sensor.solar_load_power
            name: Load
            min: 0
            max: 5000

      - type: history-graph
        title: Power (2h)
        hours_to_show: 2
        entities:
          - sensor.solar_pv_power
          - sensor.solar_load_power
          - sensor.solar_grid_power

      # Full day-ahead plan (today + tomorrow once published ~13:00 CET). The price is shown as
      # bars; the *curtailment schedule* is overlaid as translucent full-height bands (orange =
      # ZERO_EXPORT, red = FULL_CURTAIL) on a hidden 0..1 axis, so it stays visible even where
      # the price (and bar) is near zero — which is exactly when curtailment happens.
      # Requires the HACS "apexcharts-card" custom card (or the card JS dropped in www/ and
      # registered as a dashboard resource). The future curve comes from
      # sensor.solar_forecast's `points` attribute (the whole cached plan), not streamed history.
      - type: custom:apexcharts-card
        header:
          show: true
          title: Day-ahead plan (forecast)
        graph_span: 2d
        span:
          start: day
        now:
          show: true
          label: now
        yaxis:
          - id: price
            decimals: 0
            apex_config:
              title:
                text: EUR/MWh
          - id: flag
            show: false
            min: 0
            max: 1
            opposite: true
        series:
          - entity: sensor.solar_forecast
            name: Price
            type: column
            yaxis_id: price
            color: "#26a69a"
            data_generator: |
              return (entity.attributes.points || []).map(x => [x.t, x.p]);
          - entity: sensor.solar_forecast
            name: Zero export
            type: area
            yaxis_id: flag
            color: "#ffa726"
            opacity: 0.28
            stroke_width: 0
            curve: stepline
            show:
              legend_value: false
            data_generator: |
              return (entity.attributes.points || [])
                .map(x => [x.t, x.a === 'ZERO_EXPORT' ? 1 : 0]);
          - entity: sensor.solar_forecast
            name: Full curtail
            type: area
            yaxis_id: flag
            color: "#ef5350"
            opacity: 0.33
            stroke_width: 0
            curve: stepline
            show:
              legend_value: false
            data_generator: |
              return (entity.attributes.points || [])
                .map(x => [x.t, x.a === 'FULL_CURTAIL' ? 1 : 0]);

      - type: entities
        title: Detail
        entities:
          - sensor.solar_l1_power
          - sensor.solar_l2_power
          - sensor.solar_l3_power
          - sensor.solar_import_total
          - sensor.solar_export_total
          - sensor.solar_derating
          - sensor.solar_target_derating
          - sensor.solar_belpex
          - sensor.solar_action
