# Ready-to-paste Home Assistant dashboard for the smart_home entities.
# Entity ids are fixed via MQTT discovery object_id (sensor.solar_*), so this pastes cleanly.
# HA: Settings -> Dashboards -> (open/new) -> Edit (pencil) -> ⋮ -> Raw configuration editor
#     -> replace all with this -> Save.
title: Solar
views:
  - title: Overview
    cards:
      - type: glance
        title: Now
        entities:
          - entity: sensor.solar_action
            name: Action
          - entity: sensor.solar_belpex
            name: Price
          - entity: sensor.solar_derating
            name: Derating
          - entity: sensor.solar_target_derating
            name: Target

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.solar_pv_power
            name: PV
            min: 0
            max: 5000
            severity: {green: 0, yellow: 4000, red: 4800}
          - type: gauge
            entity: sensor.solar_grid_power
            name: Grid +imp/-exp
            min: -5000
            max: 5000
          - type: gauge
            entity: sensor.solar_load_power
            name: Load
            min: 0
            max: 5000

      - type: history-graph
        title: Power (24h)
        hours_to_show: 24
        entities:
          - sensor.solar_pv_power
          - sensor.solar_load_power
          - sensor.solar_grid_power

      # Full day-ahead plan (today + tomorrow once published ~13:00 CET), coloured by the
      # decided curtailment action. Requires the HACS "apexcharts-card" custom card:
      # HACS -> Frontend -> search "apexcharts-card" -> install -> reload.
      # The future part of the curve comes from sensor.solar_forecast's `points` attribute
      # (the whole cached plan), not from streamed history — so it shows before time passes.
      - type: custom:apexcharts-card
        header:
          show: true
          title: Day-ahead plan (forecast)
        graph_span: 2d
        span:
          start: day
        now:
          show: true
          label: now
        yaxis:
          - decimals: 0
            apex_config:
              title:
                text: EUR/MWh
        series:
          - entity: sensor.solar_forecast
            name: Normal
            type: column
            color: "#26a69a"
            data_generator: |
              return (entity.attributes.points || [])
                .filter(x => x.a === 'NORMAL').map(x => [x.t, x.p]);
          - entity: sensor.solar_forecast
            name: Zero export
            type: column
            color: "#ffa726"
            data_generator: |
              return (entity.attributes.points || [])
                .filter(x => x.a === 'ZERO_EXPORT').map(x => [x.t, x.p]);
          - entity: sensor.solar_forecast
            name: Full curtail
            type: column
            color: "#ef5350"
            data_generator: |
              return (entity.attributes.points || [])
                .filter(x => x.a === 'FULL_CURTAIL').map(x => [x.t, x.p]);

      - type: entities
        title: Detail
        entities:
          - sensor.solar_l1_power
          - sensor.solar_l2_power
          - sensor.solar_l3_power
          - sensor.solar_import_total
          - sensor.solar_export_total
          - sensor.solar_derating
          - sensor.solar_target_derating
          - sensor.solar_belpex
          - sensor.solar_action
