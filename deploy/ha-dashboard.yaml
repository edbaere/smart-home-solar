# Ready-to-paste Home Assistant dashboard for the smart_home entities.
# In HA: Settings -> Dashboards -> (new dashboard) -> top-right ⋮ -> "Edit Dashboard"
#        -> ⋮ -> "Raw configuration editor" -> paste this -> Save.
# NOTE: entity_ids are HA's defaults from the MQTT discovery names. If a card shows
# "entity not found", check Settings -> Devices & Services -> MQTT -> the device, and
# adjust the sensor.* ids below to match.
title: Solar Curtailment
views:
  - title: Overview
    cards:
      - type: glance
        title: Now
        entities:
          - entity: sensor.curtailment_action
            name: Action
          - entity: sensor.day_ahead_price
            name: BELPEX
          - entity: sensor.active_power_derating
            name: Derating
          - entity: sensor.target_derating
            name: Target

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.pv_production
            name: PV production
            unit: W
            min: 0
            max: 5000
            severity: {green: 0, yellow: 4000, red: 4800}
          - type: gauge
            entity: sensor.grid_net_power
            name: Grid (+import/-export)
            unit: W
            min: -5000
            max: 5000
          - type: gauge
            entity: sensor.load
            name: Load
            unit: W
            min: 0
            max: 5000

      - type: history-graph
        title: Power (24h)
        hours_to_show: 24
        entities:
          - sensor.pv_production
          - sensor.load
          - sensor.grid_net_power

      - type: entities
        title: Detail
        entities:
          - sensor.grid_l1
          - sensor.grid_l2
          - sensor.grid_l3
          - sensor.grid_import_total
          - sensor.grid_export_total
          - sensor.active_power_derating
          - sensor.target_derating
          - sensor.day_ahead_price
          - sensor.curtailment_action
